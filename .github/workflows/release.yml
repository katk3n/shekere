name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write  # GitHub Release の作成・編集に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # ユニバーサルバイナリのために両アーキテクチャを追加
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (universal macOS binary)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # タグ名をリリース名として使用し、下書き状態で作成
          draft: false
          generate_release_notes: true
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
