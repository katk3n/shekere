name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write  # Required to create and update GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Add both architectures for the universal binary
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Run Rust tests
        run: cargo test

      - name: Build Tauri app (universal macOS binary)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag name as the release name and publish immediately
          draft: false
          generate_release_notes: true
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
